name: Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Allow to run this workflow manually
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Install terraform
        uses: digitalservicebund/setup-terraform@adfabd79951446bc3078797c9cce4511328a8573 # v1.1.2
      - name: Check format
        run: |
          terraform fmt -recursive -check

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        terraform_module:
          [
            "stackit-object-storage",
            "stackit-state-bucket",
            "stackit-secrets-manager",
            "stackit-postgres-db",
          ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: "Install Terraform CLI"
        # Third-party action, pin to commit SHA!
        # See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: v1.13.4

      - name: "Terraform Init"
        run: terraform init
        working-directory: ${{ matrix.terraform_module }}

      - name: Terraform Test
        run: terraform test
        working-directory: ${{ matrix.terraform_module }}

  terraform-docs:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        terraform_module:
          [
            "stackit-object-storage",
            "stackit-state-bucket",
            "stackit-secrets-manager",
            "stackit-postgres-db",
          ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Check and update terraform docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: ${{ matrix.terraform_module }}
          output-file: README.md
          output-method: inject
          args: "--hide-empty=true --lockfile=false"

      # This step is needed because the previous step runs in docker and breaks the permissions of the workspace
      - name: "Fix workspace permissions"
        run: |
          sudo chown -R $USER:$USER .

      - name: Commit and push terraform docs changes
        if: github.event.pull_request.head.repo.full_name == github.repository # Don't commit changes from forks
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          MODULE_PATH: ${{ matrix.terraform_module }}
        run: |
          set -euo pipefail

          FILE_PATH="${MODULE_PATH}/README.md"

          git add "${FILE_PATH}"
          if git diff-index --cached --quiet HEAD -- "${FILE_PATH}"; then
            echo "No terraform-docs changes to commit for ${FILE_PATH}."
            exit 0
          fi

          FILE_CONTENT=$(base64 -i "${FILE_PATH}" | tr -d '\n')
          FILE_SHA=$(gh api "repos/${REPO}/contents/${FILE_PATH}?ref=${PR_BRANCH}" --jq .sha)

          COMMIT_MESSAGE="docs(terraform): update ${MODULE_PATH} README [skip ci]"

          gh api "repos/${REPO}/contents/${FILE_PATH}" \
            -X PUT \
            -f message="${COMMIT_MESSAGE}" \
            -f content="${FILE_CONTENT}" \
            -f sha="${FILE_SHA}" \
            -f branch="${PR_BRANCH}"

